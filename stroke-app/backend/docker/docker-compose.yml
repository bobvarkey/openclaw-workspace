# Stroke Workup App — Production Stack
# docker-compose up -d

services:
  # ─────────────────────────────────────────
  # Nginx — reverse proxy with SSL termination
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro   # Place cert + key here
    depends_on:
      - api
    networks:
      - stroke-net

  # ─────────────────────────────────────────
  # MongoDB — database
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-strokeadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-change-me-in-production}
      MONGO_INITDB_DATABASE: stroke
    volumes:
      - mongodb-data:/data/db
    networks:
      - stroke-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # API Server — Node.js/Express backend
  # ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-strokeadmin}:${MONGO_PASSWORD:-change-me-in-production}@mongodb:27017/stroke?authSource=admin
      JWT_SECRET: ${JWT_SECRET}   # REQUIRED — generate with: openssl rand -hex 32
      JWT_EXPIRY: ${JWT_EXPIRY:-8h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}  # Comma-separated list, e.g. https://app.yourdomain.com
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stroke-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  stroke-net:
    driver: bridge

volumes:
  mongodb-data:
