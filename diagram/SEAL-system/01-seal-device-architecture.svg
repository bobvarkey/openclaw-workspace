<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="white" font-size="16" font-weight="700">SEAL™ Device Architecture &amp; Mechanism of Action</text>
  <text x="30" y="53" fill="#94a3b8" font-size="9">Saccular Endovascular Aneurysm Lattice System — Galaxy Therapeutics</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- LEFT SECTION: DEVICE COMPONENTS              -->
  <!-- ──────────────────────────────────────────── -->

  <!-- Device component region -->
  <rect x="30" y="75" width="420" height="590" rx="12" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="42" y="93" fill="#fbbf24" font-size="10" font-weight="600">SEAL™ Device Components</text>

  <!-- SEAL Arc -->
  <!-- Opaque mask -->
  <rect x="55" y="110" width="370" height="120" rx="8" fill="#0f172a"/>
  <!-- Visual box -->
  <rect x="55" y="110" width="370" height="120" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="240" y="132" fill="white" font-size="12" font-weight="600" text-anchor="middle">SEAL™ Arc</text>
  <text x="240" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">For deep aneurysms (height &gt; width)</text>

  <!-- Arc features -->
  <circle cx="75" cy="168" r="3" fill="#22d3ee"/>
  <text x="85" y="172" fill="#cbd5e1" font-size="9">Deep, basket-like configuration</text>
  <circle cx="75" cy="185" r="3" fill="#22d3ee"/>
  <text x="85" y="189" fill="#cbd5e1" font-size="9">Wavy perimeter for increased surface area</text>
  <circle cx="75" cy="202" r="3" fill="#22d3ee"/>
  <text x="85" y="206" fill="#cbd5e1" font-size="9">Aneurysm width: 2.5 – 19 mm | Height: 4 – 19 mm</text>

  <!-- SEAL Base -->
  <rect x="55" y="250" width="370" height="120" rx="8" fill="#0f172a"/>
  <rect x="55" y="250" width="370" height="120" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="240" y="272" fill="white" font-size="12" font-weight="600" text-anchor="middle">SEAL™ Base</text>
  <text x="240" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">For shallow aneurysms (height ≤ width)</text>

  <circle cx="75" cy="308" r="3" fill="#34d399"/>
  <text x="85" y="312" fill="#cbd5e1" font-size="9">Shallow, double-layer basket design</text>
  <circle cx="75" cy="325" r="3" fill="#34d399"/>
  <text x="85" y="329" fill="#cbd5e1" font-size="9">Low-profile for limited dome height</text>
  <circle cx="75" cy="342" r="3" fill="#34d399"/>
  <text x="85" y="346" fill="#cbd5e1" font-size="9">Aneurysm width: 2 – 19 mm | Height: 2 – 10 mm</text>

  <!-- Key Device Characteristics -->
  <rect x="55" y="390" width="370" height="255" rx="8" fill="#0f172a"/>
  <rect x="55" y="390" width="370" height="255" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="240" y="412" fill="white" font-size="12" font-weight="600" text-anchor="middle">Key Device Characteristics</text>

  <circle cx="75" cy="432" r="3" fill="#a78bfa"/>
  <text x="85" y="436" fill="#cbd5e1" font-size="9">Self-expanding, dual-layered, braided nitinol IFD</text>

  <circle cx="75" cy="453" r="3" fill="#a78bfa"/>
  <text x="85" y="457" fill="#cbd5e1" font-size="9">No lead-in marker band — atraumatic leading tip</text>

  <circle cx="75" cy="474" r="3" fill="#a78bfa"/>
  <text x="85" y="478" fill="#cbd5e1" font-size="9">Microcatheter (MC) ID compatibility: 0.0175" – 0.033"</text>

  <circle cx="75" cy="495" r="3" fill="#a78bfa"/>
  <text x="85" y="499" fill="#cbd5e1" font-size="9">Dual-layer architecture → high surface area</text>

  <circle cx="75" cy="516" r="3" fill="#a78bfa"/>
  <text x="85" y="520" fill="#cbd5e1" font-size="9">Enhances flow diversion / early aneurysm sac thrombosis</text>

  <circle cx="75" cy="537" r="3" fill="#a78bfa"/>
  <text x="85" y="541" fill="#cbd5e1" font-size="9">Insta-SEAL™: Push-out or unsheath deployment technique</text>

  <circle cx="75" cy="558" r="3" fill="#a78bfa"/>
  <text x="85" y="562" fill="#cbd5e1" font-size="9">Treats aneurysms 2.5 – 19 mm (sidewall, bifurcation,</text>
  <text x="95" y="576" fill="#cbd5e1" font-size="9">ruptured &amp; unruptured)</text>

  <circle cx="75" cy="597" r="3" fill="#a78bfa"/>
  <text x="85" y="601" fill="#cbd5e1" font-size="9">CE Mark &amp; FDA IDE approval in progress (investigational)</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- RIGHT SECTION: MECHANISM / ANEURYSM TREATMENT-->
  <!-- ──────────────────────────────────────────── -->

  <!-- Mechanism region -->
  <rect x="490" y="75" width="480" height="590" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="502" y="93" fill="#34d399" font-size="10" font-weight="600">Intrasaccular Flow Disruption — Mechanism</text>

  <!-- Step 1: Wide Neck Bifurcation Aneurysm -->
  <rect x="510" y="110" width="440" height="100" rx="8" fill="#0f172a"/>
  <rect x="510" y="110" width="440" height="100" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="730" y="130" fill="white" font-size="11" font-weight="600" text-anchor="middle">1. Wide Neck Bifurcation Aneurysm (WNBA)</text>

  <text x="530" y="150" fill="#94a3b8" font-size="9">Saccular aneurysm at vessel bifurcation</text>
  <text x="530" y="165" fill="#94a3b8" font-size="9">with wide neck (typically neck &gt; 4 mm or</text>
  <text x="530" y="180" fill="#94a3b8" font-size="9">dome-to-neck ratio &lt; 2)</text>

  <!-- Arrow down -->
  <line x1="730" y1="210" x2="730" y2="250" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 2: Microcatheter Delivery -->
  <rect x="510" y="255" width="440" height="85" rx="8" fill="#0f172a"/>
  <rect x="510" y="255" width="440" height="85" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="730" y="275" fill="white" font-size="11" font-weight="600" text-anchor="middle">2. Microcatheter Delivery &amp; Deployment</text>

  <text x="530" y="295" fill="#94a3b8" font-size="9">SEAL device loaded into microcatheter</text>
  <text x="530" y="310" fill="#94a3b8" font-size="9">Advanced to aneurysm sac</text>
  <text x="530" y="325" fill="#94a3b8" font-size="9">Deployed via push-out or unsheath technique</text>

  <!-- Arrow down -->
  <line x1="730" y1="340" x2="730" y2="380" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 3: Flow Disruption -->
  <rect x="510" y="385" width="440" height="85" rx="8" fill="#0f172a"/>
  <rect x="510" y="385" width="440" height="85" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="730" y="405" fill="white" font-size="11" font-weight="600" text-anchor="middle">3. Intrasaccular Flow Disruption</text>

  <text x="530" y="425" fill="#94a3b8" font-size="9">Dual-layer nitinol lattice expands within sac</text>
  <text x="530" y="440" fill="#94a3b8" font-size="9">High surface area disrupts intra-aneurysmal flow</text>
  <text x="530" y="455" fill="#94a3b8" font-size="9">Parent artery preserved — no compromise</text>

  <!-- Arrow down -->
  <line x1="730" y1="470" x2="730" y2="510" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Step 4: Thrombosis -->
  <rect x="510" y="515" width="440" height="85" rx="8" fill="#0f172a"/>
  <rect x="510" y="515" width="440" height="85" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="730" y="535" fill="white" font-size="11" font-weight="600" text-anchor="middle">4. Aneurysm Thrombosis &amp; Occlusion</text>

  <text x="530" y="555" fill="#94a3b8" font-size="9">Stasis + flow disruption → thrombus formation</text>
  <text x="530" y="570" fill="#94a3b8" font-size="9">Complete endothelialization over device</text>
  <text x="530" y="585" fill="#94a3b8" font-size="9">Durable aneurysm occlusion over time</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- LEGEND BOTTOM-RIGHT                          -->
  <!-- ──────────────────────────────────────────── -->
  <rect x="490" y="675" width="200" height="5" rx="0" fill="none"/>
</svg>
