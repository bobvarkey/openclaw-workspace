<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="white" font-size="16" font-weight="700">Pre-SEAL IT — 12-Month Efficacy Outcomes</text>
  <text x="30" y="53" fill="#94a3b8" font-size="9">Primary Subgroup Analysis — Independent Core Lab Adjudication (RROC / WOS)</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- BAR CHART                                      -->
  <!-- ──────────────────────────────────────────── -->

  <!-- Bar chart box -->
  <rect x="50" y="80" width="900" height="420" rx="12" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="30" y="280" fill="#94a3b8" font-size="10" font-weight="500" text-anchor="middle" transform="rotate(-90, 30, 280)">Percentage of Patients (%)</text>

  <!-- Y-axis gridlines and labels -->
  <line x1="120" y1="450" x2="920" y2="450" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="454" fill="#64748b" font-size="9" text-anchor="end">0%</text>

  <line x1="120" y1="395" x2="920" y2="395" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="399" fill="#64748b" font-size="9" text-anchor="end">20%</text>

  <line x1="120" y1="340" x2="920" y2="340" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="344" fill="#64748b" font-size="9" text-anchor="end">40%</text>

  <line x1="120" y1="285" x2="920" y2="285" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="289" fill="#64748b" font-size="9" text-anchor="end">60%</text>

  <line x1="120" y1="230" x2="920" y2="230" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="234" fill="#64748b" font-size="9" text-anchor="end">80%</text>

  <line x1="120" y1="175" x2="920" y2="175" stroke="#1e293b" stroke-width="0.5"/>
  <text x="110" y="179" fill="#64748b" font-size="9" text-anchor="end">100%</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- BARS: Complete Occlusion (84.6%) = 11/13 -->
  <!-- Y: 450 = 0%, 175 = 100% -->
  <!-- Height: 450 - (84.6% * 275) = 450 - 232.7 = 217.3 -->
  <!-- ──────────────────────────────────────────── -->

  <!-- Bar 1: Complete Occlusion -->
  <rect x="200" y="217" width="120" height="233" rx="4" fill="#0f172a"/>
  <rect x="200" y="217" width="120" height="233" rx="4" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1.5"/>
  <text x="260" y="207" fill="white" font-size="14" font-weight="700" text-anchor="middle">84.6%</text>
  <text x="260" y="465" fill="white" font-size="10" font-weight="600" text-anchor="middle">Complete</text>
  <text x="260" y="479" fill="white" font-size="10" font-weight="600" text-anchor="middle">Occlusion</text>
  <text x="260" y="496" fill="#94a3b8" font-size="8" text-anchor="middle">11 / 13 patients</text>

  <!-- Bar 2: Adequate Occlusion (92.3%) = 12/13 -->
  <rect x="400" y="196" width="120" height="254" rx="4" fill="#0f172a"/>
  <rect x="400" y="196" width="120" height="254" rx="4" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="460" y="186" fill="white" font-size="14" font-weight="700" text-anchor="middle">92.3%</text>
  <text x="460" y="465" fill="white" font-size="10" font-weight="600" text-anchor="middle">Adequate</text>
  <text x="460" y="479" fill="white" font-size="10" font-weight="600" text-anchor="middle">Occlusion</text>
  <text x="460" y="496" fill="#94a3b8" font-size="8" text-anchor="middle">12 / 13 patients</text>

  <!-- Bar 3: Technical Success (100%) -->
  <rect x="600" y="175" width="120" height="275" rx="4" fill="#0f172a"/>
  <rect x="600" y="175" width="120" height="275" rx="4" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="660" y="165" fill="white" font-size="14" font-weight="700" text-anchor="middle">100%</text>
  <text x="660" y="465" fill="white" font-size="10" font-weight="600" text-anchor="middle">Technical</text>
  <text x="660" y="479" fill="white" font-size="10" font-weight="600" text-anchor="middle">Success</text>
  <text x="660" y="496" fill="#94a3b8" font-size="8" text-anchor="middle">13 / 13 devices</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- SAFETY HIGHLIGHTS — bottom section            -->
  <!-- ──────────────────────────────────────────── -->
  <rect x="50" y="520" width="900" height="120" rx="12" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="62" y="540" fill="#fb7185" font-size="10" font-weight="600">Safety Outcomes — Zero Primary Safety Events (0/13)</text>

  <!-- Safety item 1: Stroke -->
  <rect x="75" y="555" width="260" height="65" rx="6" fill="#0f172a"/>
  <rect x="75" y="555" width="260" height="65" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="205" y="578" fill="white" font-size="11" font-weight="600" text-anchor="middle">Major Periprocedural Stroke</text>
  <text x="205" y="602" fill="#94a3b8" font-size="11" text-anchor="middle">0 / 13 (0%)</text>

  <!-- Safety item 2: SAH -->
  <rect x="370" y="555" width="260" height="65" rx="6" fill="#0f172a"/>
  <rect x="370" y="555" width="260" height="65" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="578" fill="white" font-size="11" font-weight="600" text-anchor="middle">New Subarachnoid Hemorrhage</text>
  <text x="500" y="602" fill="#94a3b8" font-size="11" text-anchor="middle">0 / 13 (0%)</text>

  <!-- Safety item 3: Death -->
  <rect x="665" y="555" width="260" height="65" rx="6" fill="#0f172a"/>
  <rect x="665" y="555" width="260" height="65" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="795" y="578" fill="white" font-size="11" font-weight="600" text-anchor="middle">Neurologic Death</text>
  <text x="795" y="602" fill="#94a3b8" font-size="11" text-anchor="middle">0 / 13 (0%)</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- CONCLUSION                                    -->
  <!-- ──────────────────────────────────────────── -->
  <rect x="100" y="660" width="800" height="55" rx="8" fill="#0f172a"/>
  <rect x="100" y="660" width="800" height="55" rx="8" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="500" y="685" fill="white" font-size="11" font-weight="600" text-anchor="middle">Conclusion: High technical success, acceptable safety profile, and encouraging 12-month occlusion rates</text>
  <text x="500" y="703" fill="#94a3b8" font-size="9" text-anchor="middle">SEAL intrasaccular flow disruption in the treatment of wide-neck bifurcation aneurysms</text>

  <!-- ──────────────────────────────────────────── -->
  <!-- LEGEND                                        -->
  <!-- ──────────────────────────────────────────── -->
  <rect x="50" y="730" width="900" height="65" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="0.5"/>

  <rect x="70" y="742" width="12" height="12" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="88" y="752" fill="#cbd5e1" font-size="9">RROC 1 / WOS A or RROC 1 / WOS B</text>

  <rect x="300" y="742" width="12" height="12" rx="2" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1"/>
  <text x="318" y="752" fill="#cbd5e1" font-size="9">RROC 1|WOS A, RROC 1|WOS B, or RROC 2|WOS C</text>

  <text x="70" y="780" fill="#64748b" font-size="8">RROC = Raymond-Roy Occlusion Classification | WOS = Woven EndoBridge (WEB) Occlusion Scale | Device: Galaxy Therapeutics SEAL™ System</text>
</svg>
